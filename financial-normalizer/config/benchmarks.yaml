  opex_ratio:
    min: 15.0
    max: 55.0
    unit: "%"
    description: "Property operating and management costs; G&A typically 5-15%"
  revenue_growth:
    min: -20.0
    max: 30.0
    unit: "%"
    description: "Rent escalations 2-5%; acquisition-driven growth can spike"
  debt_to_equity:
    min: 0.5
    max: 5.0
    unit: "x"
